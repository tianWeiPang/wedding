<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Invitation</title>
    <style>
        :root {
            --primary-bg: #f8f6f2; /* 极浅米色，更有高级感 */
            --gold: #c5a98a;
            --glass: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--primary-bg); font-family: "PingFang SC", "Hiragino Sans GB", sans-serif;
            overflow: hidden;
        }

        /* 瓷砖背景细化：极浅的灰色线条 */
        .floor-bg {
            position: fixed; inset: 0;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }

        /* --- 顶级美化信封 --- */
        #opening-scene {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            z-index: 200; background: var(--primary-bg);
            transition: all 1s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .envelope-container {
            position: relative; width: 340px; height: 240px;
            perspective: 2000px;
            animation: float 4s ease-in-out infinite; /* 呼吸浮动效果 */
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        .envelope {
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            background: #fff; border-radius: 4px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.08), 0 5px 15px rgba(0,0,0,0.05);
        }

        .flap {
            position: absolute; width: 100%; height: 100%; background: #fff;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 顶部封口：增加阴影和折痕感 */
        .flap.top {
            z-index: 5; clip-path: polygon(0 0, 100% 0, 50% 65%);
            background: #fdfdfd; transform-origin: top;
            border-bottom: 1px solid rgba(0,0,0,0.02);
            box-shadow: inset 0 -2px 10px rgba(0,0,0,0.02);
        }

        /* 左右瓣：模拟纸张叠加的厚度 */
        .flap.left { z-index: 4; clip-path: polygon(0 0, 55% 50%, 0 100%); background: #fbfbfb; }
        .flap.right { z-index: 3; clip-path: polygon(100% 0, 100% 100%, 45% 50%); background: #fbfbfb; }
        .flap.bottom { z-index: 2; clip-path: polygon(0 45%, 100% 45%, 100% 100%, 0 100%); background: #fff; }

        /* 火漆：改为深色高级火漆 */
        .wax-seal {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            width: 55px; height: 55px; background: #6b2a2a; /* 深酒红，极显档次 */
            border-radius: 50%; z-index: 10; display: flex; align-items: center; justify-content: center;
            color: #d4af37; font-family: "Georgia", serif; font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3), inset 0 0 10px rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.1); cursor: pointer;
        }

        /* --- 首页内容：极致玻璃感 --- */
        #main-content {
            display: none; opacity: 0; width: 100%; height: 100%;
            flex-direction: column; overflow-y: auto;
            scroll-snap-type: y mandatory;
        }

        section {
            min-height: 90vh; margin: 20px auto 40px; width: 92%; max-width: 450px;
            background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 35px; border: 1px solid var(--glass-border);
            scroll-snap-align: center; position: relative; padding: 40px 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.06);
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }

        /* 首页大图：增加圆润感 */
        .hero-img {
            width: 100%; height: 320px; border-radius: 25px;
            background: url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1000') center/cover;
            border: 5px solid #fff; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* 纱幔装饰：模拟更真实的丝绸半透明感 */
        .gauze {
            position: absolute; top: 0; left: 0; width: 100%; height: 150px;
            background: linear-gradient(180deg, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0) 100%);
            border-radius: 35px 35px 0 0; pointer-events: none;
            mask-image: radial-gradient(circle at 50% 0%, black 70%, transparent 100%);
        }

        .wedding-title { font-weight: 300; font-size: 14px; letter-spacing: 5px; color: var(--gold); margin-top: 30px; }
        .names { font-size: 32px; font-weight: 300; color: #333; margin: 15px 0; font-family: "STKaiti", serif; }

        /* 状态控制 */
        .is-open .flap.top { transform: rotateX(160deg); }
        .is-open .envelope-container { transform: scale(0.8); opacity: 0; transition: all 1s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>

    <div class="floor-bg"></div>

    <div id="opening-scene">
        <div class="envelope-container" id="envContainer" onclick="handleOpen()">
            <div class="envelope">
                <div class="flap top"></div>
                <div class="flap left"></div>
                <div class="flap right"></div>
                <div class="flap bottom"></div>
                <div class="wax-seal">囍</div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <section>
            <div class="gauze"></div>
            <div class="hero-img"></div>
            <div class="wedding-title">SAVE THE DATE</div>
            <div class="names">张大千 & 陆小曼</div>
            <p style="font-size: 14px; color: #777; line-height: 1.8; padding: 0 20px;">
                在满是阳光的庭院里<br>
                在轻柔拂过的纱幔下<br>
                我们想邀请最亲近的你<br>
                一同见证
            </p>
        </section>

        <section>
            <div class="gauze"></div>
            <h2 style="font-weight: 300; margin-bottom: 25px;">Moment</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%;">
                <div style="grid-column: span 2; height: 180px; border-radius: 15px; background: url('https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=800') center/cover;"></div>
                <div style="height: 120px; border-radius: 15px; background: url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=400') center/cover;"></div>
                <div style="height: 120px; border-radius: 15px; background: url('https://images.unsplash.com/photo-1550005816-09246d377488?w=400') center/cover;"></div>
            </div>
        </section>

        <section>
            <div class="gauze"></div>
            <h2 style="font-weight: 300; margin-bottom: 40px;">Wedding Details</h2>
            <div style="text-align: left; width: 100%; padding: 0 10px;">
                <div style="margin-bottom: 25px;">
                    <span style="color: var(--gold); font-size: 12px; letter-spacing: 2px;">TIME</span>
                    <div style="font-size: 18px; color: #444; margin-top: 5px;">2026年05月20日 11:58 AM</div>
                </div>
                <div style="margin-bottom: 25px;">
                    <span style="color: var(--gold); font-size: 12px; letter-spacing: 2px;">ADDRESS</span>
                    <div style="font-size: 18px; color: #444; margin-top: 5px;">北京市朝阳区某某路 我们的庭院</div>
                </div>
            </div>
            <button style="margin-top: 40px; width: 100%; padding: 18px; border-radius: 50px; border: none; background: #333; color: #fff; font-size: 15px; letter-spacing: 2px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
                确认出席 RSVP
            </button>
        </section>
    </div>

    <script>
        function handleOpen() {
            const scene = document.getElementById('opening-scene');
            const content = document.getElementById('main-content');
            
            // 触发信封开启效果
            document.body.classList.add('is-open');
            
            // 1秒后淡出场景，淡入内容
            setTimeout(() => {
                scene.style.opacity = '0';
                scene.style.transform = 'scale(1.2)';
                
                setTimeout(() => {
                    scene.style.display = 'none';
                    content.style.display = 'flex';
                    setTimeout(() => {
                        content.style.opacity = '1';
                        document.body.style.overflowY = 'auto';
                    }, 50);
                }, 800);
            }, 800);
        }
    </script>
</body>
</html>
